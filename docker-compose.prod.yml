# Production-only compose — API only, no frontend
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: tuta699/credit-card-fraud-detection:latest
    container_name: fraud-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./config:/app/config:ro
      - fraud-logs:/app/logs
    environment:
      - APP_ENV=production
      - LOG_LEVEL=WARNING
      - PYTHONUNBUFFERED=1
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - ENABLE_RESET_ENDPOINT=false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - fraud-detection

volumes:
  fraud-logs:

networks:
  fraud-detection:
    driver: bridge
