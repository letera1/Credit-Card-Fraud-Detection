# Configuration file for the project

data:
  raw_data_path: "data/creditcard.csv"
  processed_data_path: "data/processed/"
  test_size: 0.2
  random_state: 42

preprocessing:
  scale_amount: true
  stratify: true

sampling:
  strategies:
    - "original"
    - "undersampling"
    - "oversampling"
    - "smote"
  smote_k_neighbors: 5

models:
  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    class_weight: "balanced"
    n_jobs: -1
  
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    n_jobs: -1

hyperparameter_tuning:
  cv_folds: 3
  scoring: "roc_auc"
  param_grid:
    max_depth: [4, 6, 8]
    learning_rate: [0.05, 0.1, 0.2]
    n_estimators: [50, 100, 200]

business:
  avg_fraud_amount: 500
  cost_false_positive: 10
  optimal_threshold: 0.35

outputs:
  models_dir: "models/"
  plots_dir: "outputs/plots/"
  results_dir: "outputs/results/"
